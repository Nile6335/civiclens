name: Nightly ingest (sample-corpus dry run)

# Exercises the full ingestion path nightly against the bundled sample corpus —
# catches parser/schema drift without depending on network sources. Live ingestion
# stays a manual/local operation (make ingest-live).

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ingest-dry-run:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: civiclens
          POSTGRES_PASSWORD: civiclens
          POSTGRES_DB: civiclens
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U civiclens -d civiclens"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://civiclens:civiclens@localhost:5442/civiclens
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      EMBEDDING_DIM: "384"
      TOPIC_TAGGER: keyword
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - run: uv run python -m common.db
      - run: uv run python -m ingestion.cli samples
      - run: uv run python -m retrieval.index
      - name: Corpus stats
        run: |
          uv run python -c "
          from common.db import get_connection
          from ingestion.store import corpus_stats
          with get_connection() as conn:
              print(corpus_stats(conn))"
